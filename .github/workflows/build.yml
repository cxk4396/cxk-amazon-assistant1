name: Build
on:
  push:
    branches: [main, master]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install npm deps
        run: cd frontend && npm install
      - name: Build frontend
        run: cd frontend && npm run build
      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0.0" --locked
      - name: Generate default icons
        run: |
          cd src-tauri
          # Create a simple 1024x1024 base icon using ImageMagick or download default
          curl -L -o icon.png "https://raw.githubusercontent.com/tauri-apps/tauri/dev/tooling/bundler/src/bundle/windows/resources/icon.png" || echo "Using placeholder"
          cargo tauri icon icon.png || echo "Icon generation skipped"
        shell: bash
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "App v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
