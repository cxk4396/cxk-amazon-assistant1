name: Build
on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install
      
      - name: Build frontend
        working-directory: ./frontend
        run: npx vite build
      
      - name: Install Tauri CLI
        if: success()
        run: cargo install tauri-cli --version "^2.0.0" --locked
      
      - name: Create icons directory
        if: success()
        shell: pwsh
        run: |
          if (!(Test-Path "src-tauri/icons")) {
            New-Item -ItemType Directory -Force -Path "src-tauri/icons"
          }
      
      - name: Create icon with .NET
        if: success()
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $bmp = New-Object System.Drawing.Bitmap(1024, 1024)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.Clear([System.Drawing.Color]::FromArgb(255, 153, 0))
          $font = New-Object System.Drawing.Font("Arial", 300, [System.Drawing.FontStyle]::Bold)
          $brush = [System.Drawing.Brushes]::White
          $format = New-Object System.Drawing.StringFormat
          $format.Alignment = [System.Drawing.StringAlignment]::Center
          $format.LineAlignment = [System.Drawing.StringAlignment]::Center
          $g.DrawString("CXK", $font, $brush, 512, 512, $format)
          $bmp.Save("src-tauri/icons/icon.png")
          $g.Dispose()
          $bmp.Dispose()
      
      - name: Generate Tauri icons
        if: success()
        shell: pwsh
        run: |
          cd src-tauri
          cargo tauri icon icons/icon.png
      
      - name: Build Tauri App
        if: success()
        shell: pwsh
        run: |
          cd src-tauri
          cargo tauri build
      
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: src-tauri/target/release/bundle/**/*.exe
