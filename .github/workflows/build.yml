name: Build
on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          npm ci
          npm list
      
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
      
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked
      
      - name: Setup icons
        shell: pwsh
        run: |
          # Create icons directory
          $iconsDir = "src-tauri/icons"
          if (!(Test-Path $iconsDir)) {
            New-Item -ItemType Directory -Force -Path $iconsDir | Out-Null
          }
          
          # Create icon using .NET
          Add-Type -AssemblyName System.Drawing
          $size = 1024
          $bmp = New-Object System.Drawing.Bitmap($size, $size)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.Clear([System.Drawing.Color]::FromArgb(255, 153, 0))
          $font = New-Object System.Drawing.Font("Arial", 300, [System.Drawing.FontStyle]::Bold)
          $brush = [System.Drawing.Brushes]::White
          $format = New-Object System.Drawing.StringFormat
          $format.Alignment = [System.Drawing.StringAlignment]::Center
          $format.LineAlignment = [System.Drawing.StringAlignment]::Center
          $g.DrawString("CXK", $font, $brush, $size/2, $size/2, $format)
          $iconPath = "$iconsDir/icon.png"
          $bmp.Save($iconPath)
          $g.Dispose()
          $bmp.Dispose()
          Write-Host "Icon created at: $iconPath"
      
      - name: Generate Tauri icons
        shell: pwsh
        run: |
          cd src-tauri
          cargo tauri icon icons/icon.png
      
      - name: Build Tauri App
        shell: pwsh
        run: |
          cd src-tauri
          cargo tauri build
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cxk-amazon-assistant-installer
          path: src-tauri/target/release/bundle/**/*.exe
