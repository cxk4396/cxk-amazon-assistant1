name: Build
on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Create icon
        shell: pwsh
        run: |
          cd src-tauri
          # 创建一个简单的 1x1 像素 PNG 并放大到 1024x1024
          # 使用 .NET 创建纯色图片
          Add-Type -AssemblyName System.Drawing
          $bmp = New-Object System.Drawing.Bitmap(1024, 1024)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.Clear([System.Drawing.Color]::FromArgb(66, 133, 244))
          # 添加文字 CXK
          $font = New-Object System.Drawing.Font("Arial", 300)
          $brush = [System.Drawing.Brushes]::White
          $g.DrawString("CXK", $font, $brush, 100, 300)
          $g.Dispose()
          $font.Dispose()
          $bmp.Save("icon.png", [System.Drawing.Imaging.ImageFormat]::Png)
          $bmp.Dispose()
          Write-Host "Icon created successfully"
          Get-ChildItem icon.png

      - name: Generate Tauri icons
        run: |
          cd src-tauri
          cargo tauri icon icon.png

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "App v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
