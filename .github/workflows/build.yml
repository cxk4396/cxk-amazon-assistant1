name: Build
on:
  push:
    branches: [main, master]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install npm deps
        run: cd frontend && npm install
      - name: Build frontend
        run: cd frontend && npm run build
      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0.0" --locked
      - name: Download and generate icons
        shell: bash
        run: |
          cd src-tauri
          # Download a valid PNG icon (Tauri logo as placeholder)
          curl -L -o icon.png "https://raw.githubusercontent.com/tauri-apps/tauri/dev/examples/api/src-tauri/icons/icon.png"
          # Generate icons
          cargo tauri icon icon.png
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "App v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
