name: Build
on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Create icon with ImageMagick
        shell: pwsh
        run: |
          # 使用 ImageMagick 创建图标（GitHub Actions Windows runner 已预装）
          $iconPath = "$PWD\src-tauri\icon.png"
          
          # 创建一个 1024x1024 的纯色背景图标
          magick convert -size 1024x1024 xc:#4285F4 -pointsize 300 -fill white -gravity center -annotate +0+0 "CXK" "$iconPath"
          
          if (Test-Path "$iconPath") {
            Write-Host "Icon created successfully at: $iconPath"
            Get-ChildItem "$iconPath"
          } else {
            Write-Error "Failed to create icon"
            exit 1
          }

      - name: Generate Tauri icons
        run: |
          cd src-tauri
          cargo tauri icon icon.png

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "App v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
