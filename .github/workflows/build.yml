name: Build
on:
  push:
    branches: [main, master]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install npm deps
        run: cd frontend && npm install
      - name: Build frontend
        run: cd frontend && npm run build
      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0.0" --locked
      - name: Generate icons with ImageMagick
        shell: pwsh
        run: |
          cd src-tauri
          # Create a simple 1024x1024 blue square icon using ImageMagick
          $xml = @"
          <svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024">
            <rect width="1024" height="1024" fill="#4285f4"/>
            <text x="512" y="600" font-size="400" text-anchor="middle" fill="white" font-family="Arial">CXK</text>
          </svg>
          "@
          $xml | Out-File -FilePath "icon.svg" -Encoding UTF8
          # Use ImageMagick to convert SVG to PNG if available, otherwise download a default
          magick convert icon.svg icon.png 2>$null || curl -L -o icon.png "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Playstation_logo_colour.svg/1024px-Playstation_logo_colour.svg.png"
          cargo tauri icon icon.png
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "App v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
