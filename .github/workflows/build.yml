name: Build
on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      
      - run: cd frontend && npm install
      - run: cd frontend && npm run build
      - run: cargo install tauri-cli --version "^2.0.0" --locked
      
      - name: Create icon
        shell: pwsh
        run: magick convert -size 1024x1024 xc:#4285F4 -pointsize 300 -fill white -gravity center -annotate +0+0 "CXK" src-tauri/icon.png
      
      - run: cd src-tauri && cargo tauri icon icon.png
      
      - name: Build
        shell: pwsh
        run: cd src-tauri && cargo tauri build
      
      - uses: actions/upload-artifact@v4
        with:
          name: installer
          path: src-tauri/target/release/bundle/**/*.exe
