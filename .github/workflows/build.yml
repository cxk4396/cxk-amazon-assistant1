name: Build
on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      
      - run: cd frontend && npm install
      - run: cd frontend && npm run build
      - run: cargo install tauri-cli --version "^2.0.0" --locked
      
      - name: Create icon with .NET
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $bmp = New-Object System.Drawing.Bitmap(1024, 1024)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.Clear([System.Drawing.Color]::FromArgb(255, 153, 0))
          $font = New-Object System.Drawing.Font("Arial", 300, [System.Drawing.FontStyle]::Bold)
          $brush = [System.Drawing.Brushes]::White
          $format = New-Object System.Drawing.StringFormat
          $format.Alignment = [System.Drawing.StringAlignment]::Center
          $format.LineAlignment = [System.Drawing.StringAlignment]::Center
          $g.DrawString("CXK", $font, $brush, 512, 512, $format)
          $bmp.Save("src-tauri/icons/icon.png")
          $g.Dispose()
          $bmp.Dispose()
      
      - name: Build
        shell: pwsh
        run: cd src-tauri && cargo tauri build
      
      - uses: actions/upload-artifact@v4
        with:
          name: installer
          path: src-tauri/target/release/bundle/**/*.exe
